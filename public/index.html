<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOCPATS · realtime advisor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #0a0d12;
        --bg-1: #11161e;
        --bg-2: #161c25;
        --bg-3: #1c2530;
        --border: #1e2733;
        --border-soft: #1a222d;
        --text: #d8e0e8;
        --text-bright: #ffffff;
        --muted: #6c7a8a;
        --green: #4ade80;
        --green-dim: #1f3a2a;
        --red: #f87171;
        --red-dim: #3a1f24;
        --amber: #fbbf24;
        --blue: #60a5fa;
        --cyan: #22d3ee;
        --purple: #a78bfa;
        --orange: #fb923c;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        background: var(--bg-0);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.55;
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at 20% 0%,
            rgba(34, 211, 238, 0.04),
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 100%,
            rgba(167, 139, 250, 0.03),
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .header {
        position: relative;
        border-bottom: 1px solid var(--border);
        padding: 16px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
        z-index: 1;
        flex-wrap: wrap;
        gap: 12px;
      }

      .header h1 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 19px;
        letter-spacing: -0.5px;
      }
      .header h1 .accent {
        color: var(--cyan);
      }
      .header h1 .subtitle {
        color: var(--muted);
        font-weight: 500;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-left: 12px;
      }

      .status-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 11px;
        color: var(--muted);
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 10px;
        border-radius: 3px;
        background: var(--bg-2);
        border: 1px solid var(--border);
        letter-spacing: 0.5px;
        color: var(--green);
      }
      .status-pill .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
        animation: pulse 2s infinite;
      }
      .status-pill.warn {
        color: var(--amber);
        border-color: rgba(251, 191, 36, 0.35);
      }
      .status-pill.warn .dot {
        background: var(--amber);
        box-shadow: 0 0 6px var(--amber);
      }
      .status-pill.error {
        color: var(--red);
        border-color: rgba(248, 113, 113, 0.35);
      }
      .status-pill.error .dot {
        background: var(--red);
        box-shadow: 0 0 6px var(--red);
        animation: none;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .grid {
        position: relative;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
        gap: 1px;
        background: var(--border);
        z-index: 1;
      }

      .card {
        background: var(--bg-1);
        padding: 22px 26px;
        transition: background 0.2s;
      }
      .card:hover {
        background: var(--bg-2);
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-soft);
      }
      .card-head .symbol {
        font-family: "Space Grotesk", sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--text-bright);
      }
      .card-head .meta {
        font-size: 10px;
        letter-spacing: 1px;
        color: var(--muted);
        text-transform: uppercase;
      }

      .price-row {
        display: flex;
        align-items: baseline;
        gap: 14px;
        margin-bottom: 6px;
      }
      .price {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text-bright);
        font-variant-numeric: tabular-nums;
        padding: 0 4px;
        border-radius: 3px;
        transition:
          color 0.4s,
          background 0.6s;
      }
      .price.flash-up {
        color: var(--green);
        background: rgba(74, 222, 128, 0.18);
      }
      .price.flash-down {
        color: var(--red);
        background: rgba(248, 113, 113, 0.18);
      }
      .change {
        font-size: 14px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 3px;
        font-variant-numeric: tabular-nums;
      }
      .change.pos {
        color: var(--green);
        background: var(--green-dim);
      }
      .change.neg {
        color: var(--red);
        background: var(--red-dim);
      }

      .tick-line {
        font-size: 10px;
        letter-spacing: 1px;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 14px;
        height: 14px;
      }
      .tick-line.warn {
        color: var(--amber);
      }
      .tick-line.dead {
        color: var(--red);
        font-weight: 600;
      }

      .tf-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin: 4px 0 18px;
      }
      .tf {
        background: var(--bg-2);
        padding: 8px 6px;
        border-radius: 3px;
        text-align: center;
        border-left: 2px solid var(--muted);
      }
      .tf .label {
        color: var(--muted);
        display: block;
        margin-bottom: 4px;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .tf .arrow {
        font-size: 16px;
        font-weight: 700;
      }
      .tf.bullish {
        border-left-color: var(--green);
      }
      .tf.bullish .arrow {
        color: var(--green);
      }
      .tf.bearish {
        border-left-color: var(--red);
      }
      .tf.bearish .arrow {
        color: var(--red);
      }
      .tf.mixed {
        border-left-color: var(--amber);
      }
      .tf.mixed .arrow {
        color: var(--amber);
      }
      .tf.neutral .arrow {
        color: var(--muted);
      }

      .data-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 24px;
      }
      .data-row {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        border-bottom: 1px dashed var(--border-soft);
        font-size: 12px;
      }
      .data-row:last-child,
      .data-row:nth-last-child(2) {
        border-bottom: none;
      }
      .data-row .key {
        color: var(--muted);
        text-transform: lowercase;
        letter-spacing: 0.3px;
      }
      .data-row .val {
        font-weight: 600;
        color: var(--text-bright);
        font-variant-numeric: tabular-nums;
      }
      .data-row .val.warn {
        color: var(--amber);
      }
      .data-row .val.pos {
        color: var(--green);
      }
      .data-row .val.neg {
        color: var(--red);
      }

      .levels-bar {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        font-size: 11px;
      }
      .levels-bar .lvl {
        flex: 1;
        padding: 6px 10px;
        border-radius: 3px;
        text-align: center;
        background: var(--bg-2);
      }
      .levels-bar .lvl.r {
        border-left: 2px solid var(--red);
      }
      .levels-bar .lvl.s {
        border-left: 2px solid var(--green);
      }
      .levels-bar .lvl span {
        display: block;
        color: var(--muted);
        font-size: 9px;
        letter-spacing: 1px;
        margin-bottom: 2px;
      }
      .levels-bar .lvl strong {
        color: var(--text-bright);
        font-weight: 600;
      }

      .smart-money {
        margin-top: 16px;
        padding: 12px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid var(--cyan);
      }
      .sm-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--cyan);
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .sm-divergence {
        font-size: 9px;
        letter-spacing: 0.5px;
        color: var(--muted);
        text-transform: none;
        font-weight: 400;
      }
      .sm-divergence.div-strong {
        color: var(--amber);
        font-weight: 600;
      }
      .sm-divergence.div-mild {
        color: var(--blue);
      }
      .sm-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .sm-side {
        font-size: 10px;
      }
      .sm-label {
        color: var(--muted);
        text-transform: lowercase;
        margin-bottom: 4px;
        letter-spacing: 0.5px;
      }
      .sm-bar {
        display: flex;
        height: 6px;
        border-radius: 2px;
        overflow: hidden;
        background: var(--bg-3);
      }
      .sm-bar-long {
        background: var(--green);
        height: 100%;
        transition: width 0.4s;
      }
      .sm-bar-short {
        background: var(--red);
        height: 100%;
        transition: width 0.4s;
      }
      .sm-meta {
        display: flex;
        justify-content: space-between;
        margin-top: 4px;
        font-variant-numeric: tabular-nums;
      }
      .sm-long {
        color: var(--green);
        font-weight: 600;
      }
      .sm-short {
        color: var(--red);
        font-weight: 600;
      }
      .sm-ratio {
        color: var(--text-bright);
        font-weight: 600;
      }

      /* ML signal block */
      .ml-block {
        margin-top: 12px;
        padding: 12px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid var(--purple);
      }
      .ml-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--purple);
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .ml-age {
        font-size: 9px;
        color: var(--muted);
        text-transform: none;
        font-weight: 400;
      }
      .ml-signal-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }
      .ml-badge {
        padding: 4px 10px;
        border-radius: 3px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .ml-badge.buy {
        background: var(--green-dim);
        color: var(--green);
      }
      .ml-badge.sell {
        background: var(--red-dim);
        color: var(--red);
      }
      .ml-badge.hold {
        background: var(--bg-3);
        color: var(--muted);
      }
      .ml-conf {
        color: var(--text-bright);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .ml-bars {
        display: flex;
        height: 6px;
        border-radius: 2px;
        overflow: hidden;
        background: var(--bg-3);
        margin-bottom: 6px;
      }
      .ml-bars .b {
        background: var(--green);
      }
      .ml-bars .h {
        background: var(--muted);
      }
      .ml-bars .s {
        background: var(--red);
      }
      .ml-probs {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        font-variant-numeric: tabular-nums;
      }
      .ml-probs .b {
        color: var(--green);
        font-weight: 600;
      }
      .ml-probs .h {
        color: var(--muted);
        font-weight: 600;
      }
      .ml-probs .s {
        color: var(--red);
        font-weight: 600;
      }
      .ml-na {
        color: var(--muted);
        font-style: italic;
        font-size: 11px;
      }

      /* ─── CVD Block (Spot vs Perp flow) ─── */
      .cvd-block {
        margin-top: 12px;
        padding: 12px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid var(--orange);
      }
      .cvd-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--orange);
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cvd-divergence {
        font-size: 9px;
        letter-spacing: 0.5px;
        color: var(--muted);
        text-transform: none;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 2px;
      }
      .cvd-divergence.squeeze {
        color: var(--green);
        background: var(--green-dim);
      }
      .cvd-divergence.trap {
        color: var(--red);
        background: var(--red-dim);
      }
      .cvd-divergence.bull {
        color: var(--green);
      }
      .cvd-divergence.bear {
        color: var(--red);
      }
      .cvd-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .cvd-side {
        font-size: 10px;
      }
      .cvd-label {
        color: var(--muted);
        text-transform: lowercase;
        margin-bottom: 4px;
        letter-spacing: 0.5px;
      }
      .cvd-meta {
        display: flex;
        justify-content: space-between;
        font-variant-numeric: tabular-nums;
        margin-top: 3px;
      }
      .cvd-ratio {
        color: var(--text-bright);
        font-weight: 700;
        font-size: 12px;
      }
      .cvd-ratio.pos {
        color: var(--green);
      }
      .cvd-ratio.neg {
        color: var(--red);
      }
      .cvd-net {
        color: var(--muted);
        font-size: 9px;
      }

      /* ─── Order Book Block ─── */
      .ob-block {
        margin-top: 12px;
        padding: 12px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid var(--blue);
      }
      .ob-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--blue);
        margin-bottom: 10px;
      }
      .ob-imb-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 8px;
      }
      .ob-imb {
        text-align: center;
        font-size: 10px;
      }
      .ob-imb .lbl {
        color: var(--muted);
        font-size: 9px;
        letter-spacing: 1px;
        margin-bottom: 2px;
      }
      .ob-imb .val {
        font-weight: 700;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }
      .ob-imb .val.pos {
        color: var(--green);
      }
      .ob-imb .val.neg {
        color: var(--red);
      }
      .ob-walls {
        display: flex;
        gap: 8px;
        font-size: 10px;
        font-variant-numeric: tabular-nums;
      }
      .ob-wall {
        flex: 1;
        padding: 4px 6px;
        border-radius: 2px;
        background: var(--bg-3);
      }
      .ob-wall .lbl {
        color: var(--muted);
        font-size: 9px;
        letter-spacing: 0.5px;
        display: block;
      }
      .ob-wall.bid {
        border-left: 2px solid var(--green);
      }
      .ob-wall.ask {
        border-left: 2px solid var(--red);
      }

      /* ─── Coinbase Premium Block ─── */
      .cb-block {
        margin-top: 12px;
        padding: 10px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid var(--purple);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .cb-left .cb-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--purple);
      }
      .cb-left .cb-sub {
        font-size: 9px;
        color: var(--muted);
        margin-top: 2px;
      }
      .cb-right {
        text-align: right;
      }
      .cb-premium {
        font-size: 16px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .cb-premium.pos {
        color: var(--green);
      }
      .cb-premium.neg {
        color: var(--red);
      }
      .cb-interp {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 2px;
        color: var(--muted);
      }

      /* ─── Funding Trend Block ─── */
      .ft-block {
        margin-top: 12px;
        padding: 10px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid var(--amber);
      }
      .ft-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--amber);
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
      }
      .ft-trend {
        font-size: 9px;
        font-weight: 600;
        text-transform: none;
        padding: 2px 6px;
        border-radius: 2px;
        background: var(--bg-3);
      }
      .ft-trend.heating_long {
        color: var(--red);
        background: var(--red-dim);
      }
      .ft-trend.heating_short {
        color: var(--green);
        background: var(--green-dim);
      }
      .ft-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        font-size: 10px;
      }
      .ft-cell {
        text-align: center;
      }
      .ft-cell .lbl {
        color: var(--muted);
        font-size: 9px;
        letter-spacing: 0.5px;
      }
      .ft-cell .val {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        font-size: 11px;
      }
      .ft-cell .val.pos {
        color: var(--green);
      }
      .ft-cell .val.neg {
        color: var(--red);
      }

      /* ─── On-chain Solana Block ─── */
      .onchain-block {
        margin-top: 12px;
        padding: 12px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid #14f195; /* Solana brand green */
      }
      .onchain-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #14f195;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .onchain-interp {
        font-size: 9px;
        font-weight: 700;
        text-transform: none;
        padding: 2px 6px;
        border-radius: 2px;
        letter-spacing: 0.5px;
      }
      .onchain-interp.fundamental_bullish {
        color: var(--green);
        background: var(--green-dim);
      }
      .onchain-interp.fundamental_bearish {
        color: var(--red);
        background: var(--red-dim);
      }
      .onchain-interp.mixed {
        color: var(--amber);
        background: rgba(251, 191, 36, 0.15);
      }
      .onchain-interp.neutral {
        color: var(--muted);
      }
      .onchain-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 8px;
      }
      .onchain-cell {
        text-align: center;
        font-size: 10px;
      }
      .onchain-cell .lbl {
        color: var(--muted);
        font-size: 9px;
        letter-spacing: 0.5px;
        margin-bottom: 2px;
      }
      .onchain-cell .val {
        font-weight: 700;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        color: var(--text-bright);
      }
      .onchain-cell .delta {
        font-size: 9px;
        font-weight: 600;
        margin-top: 1px;
        font-variant-numeric: tabular-nums;
      }
      .onchain-cell .delta.pos {
        color: var(--green);
      }
      .onchain-cell .delta.neg {
        color: var(--red);
      }
      .onchain-protos {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed var(--border-soft);
        font-size: 9px;
      }
      .onchain-protos-title {
        color: var(--muted);
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .onchain-proto-row {
        display: flex;
        justify-content: space-between;
        padding: 2px 0;
        font-variant-numeric: tabular-nums;
      }
      .onchain-proto-name {
        color: var(--text);
      }
      .onchain-proto-change.pos {
        color: var(--green);
      }
      .onchain-proto-change.neg {
        color: var(--red);
      }

      /* ─── Stop Hunting / Magnets Block ─── */
      .magnets-block {
        margin-top: 12px;
        padding: 12px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid #f43f5e;
      }
      .magnets-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #f43f5e;
        margin-bottom: 10px;
      }
      .magnets-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .magnets-side .lbl {
        color: var(--muted);
        font-size: 9px;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .magnets-item {
        padding: 4px 6px;
        background: var(--bg-3);
        border-radius: 2px;
        margin-bottom: 3px;
        font-size: 10px;
        font-variant-numeric: tabular-nums;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .magnets-item.above {
        border-left: 2px solid var(--red);
      }
      .magnets-item.below {
        border-left: 2px solid var(--green);
      }
      .magnets-item .price {
        font-weight: 700;
        color: var(--text-bright);
      }
      .magnets-item .dist {
        color: var(--muted);
        font-size: 9px;
      }
      .magnets-item.strong {
        background: rgba(244, 63, 94, 0.15);
      }
      .magnets-conf {
        display: inline-block;
        background: var(--amber);
        color: var(--bg-0);
        font-weight: 700;
        font-size: 9px;
        padding: 1px 4px;
        border-radius: 2px;
        margin-left: 4px;
      }
      .magnets-strongest {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed var(--border-soft);
        font-size: 10px;
        color: var(--muted);
      }
      .magnets-strongest strong {
        color: #f43f5e;
        font-weight: 700;
      }

      /* ─── Aggregate Funding Block ─── */
      .aggfund-block {
        margin-top: 12px;
        padding: 10px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid #fbbf24;
      }
      .aggfund-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #fbbf24;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
      }
      .aggfund-extreme {
        font-size: 9px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 2px;
        text-transform: none;
        letter-spacing: 0.5px;
      }
      .aggfund-extreme.all_long_extreme {
        color: var(--red);
        background: var(--red-dim);
      }
      .aggfund-extreme.all_short_extreme {
        color: var(--green);
        background: var(--green-dim);
      }
      .aggfund-extreme.divergent {
        color: var(--amber);
      }
      .aggfund-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        font-size: 10px;
      }
      .aggfund-cell {
        text-align: center;
      }
      .aggfund-cell .ex {
        color: var(--muted);
        font-size: 9px;
        letter-spacing: 0.5px;
      }
      .aggfund-cell .rate {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        font-size: 11px;
      }
      .aggfund-cell .rate.pos {
        color: var(--green);
      }
      .aggfund-cell .rate.neg {
        color: var(--red);
      }
      .aggfund-cell.avg {
        background: var(--bg-3);
        border-radius: 2px;
        padding: 4px 2px;
      }
      .aggfund-cell.avg .ex {
        color: #fbbf24;
        font-weight: 700;
      }
      .aggfund-divergence {
        margin-top: 6px;
        font-size: 9px;
        color: var(--muted);
        text-align: center;
      }
      .aggfund-divergence strong {
        color: var(--amber);
      }

      /* ─── Deribit Options Block ─── */
      .deribit-block {
        margin-top: 12px;
        padding: 12px 14px;
        background: var(--bg-2);
        border-radius: 3px;
        border-left: 2px solid #8b5cf6;
      }
      .deribit-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #8b5cf6;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
      }
      .deribit-expiry {
        font-size: 9px;
        color: var(--muted);
        text-transform: none;
        letter-spacing: 0.5px;
      }
      .deribit-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 8px;
      }
      .deribit-cell {
        text-align: center;
        font-size: 10px;
      }
      .deribit-cell .lbl {
        color: var(--muted);
        font-size: 9px;
        letter-spacing: 0.5px;
      }
      .deribit-cell .val {
        font-weight: 700;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      .deribit-cell .interp {
        font-size: 9px;
        color: var(--muted);
        margin-top: 1px;
      }
      .deribit-cell .interp.heavy_puts {
        color: var(--green);
      }
      .deribit-cell .interp.heavy_calls {
        color: var(--red);
      }
      .deribit-cell .interp.pulls_up {
        color: var(--green);
      }
      .deribit-cell .interp.pulls_down {
        color: var(--red);
      }
      .deribit-strikes {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px dashed var(--border-soft);
        font-size: 9px;
        color: var(--muted);
      }
      .deribit-strike-row {
        display: flex;
        justify-content: space-between;
        font-variant-numeric: tabular-nums;
        padding: 1px 0;
      }
      .deribit-strike-price {
        color: var(--text);
        font-weight: 600;
      }

      .advice-section {
        position: relative;
        margin: 28px;
        padding: 26px 30px;
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-left: 3px solid var(--cyan);
        z-index: 1;
      }
      .advice-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border-soft);
      }
      .advice-head h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 13px;
        letter-spacing: 2px;
        color: var(--cyan);
        font-weight: 600;
        text-transform: uppercase;
      }

      button.advice-btn {
        background: var(--cyan);
        color: var(--bg-0);
        border: 0;
        padding: 8px 18px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.15s;
      }
      button.advice-btn:hover {
        background: #67e8f9;
        transform: translateY(-1px);
      }
      button.advice-btn:disabled {
        opacity: 0.5;
        cursor: wait;
        transform: none;
      }

      .advice-content {
        white-space: pre-wrap;
        line-height: 1.75;
        color: var(--text);
        font-size: 13px;
      }
      .advice-content b {
        color: var(--cyan);
        font-weight: 700;
      }

      .advice-meta {
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 1px;
        margin-top: 16px;
        text-transform: uppercase;
      }

      .placeholder {
        color: var(--muted);
        font-style: italic;
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .price {
          font-size: 24px;
        }
        .header {
          padding: 12px 18px;
        }
        .advice-section {
          margin: 18px;
          padding: 20px;
        }
        .data-grid {
          grid-template-columns: 1fr;
          gap: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>
        DOCPATS<span class="accent">.</span>advisor<span class="subtitle"
          >realtime</span
        >
      </h1>
      <div class="status-bar">
        <div class="status-pill" id="wsPill">
          <span class="dot"></span>
          <span id="wsStatus">connecting...</span>
        </div>
        <div class="status-pill" id="msgPill" style="color: var(--muted)">
          <span id="msgCount">0 msg</span>
        </div>
        <span id="lastUpdate">—</span>
      </div>
    </div>

    <div class="grid" id="cards"></div>

    <section class="advice-section">
      <div class="advice-head">
        <h2>Claude · analysis</h2>
        <button class="advice-btn" id="getAdvice">обновить совет</button>
      </div>
      <div class="advice-content placeholder" id="advice">
        Нажми «обновить совет», чтобы получить анализ от Claude по текущему
        снимку рынка.
      </div>
      <div class="advice-meta" id="adviceTime"></div>
    </section>

    <script>
      const $ = (id) => document.getElementById(id);
      const fmt = (n, d = 2) =>
        n == null || isNaN(n) ? "—" : Number(n).toFixed(d);
      const fmtPct = (n) =>
        n == null || isNaN(n)
          ? "—"
          : (n >= 0 ? "+" : "") + Number(n).toFixed(2) + "%";
      const fmtBig = (n) => {
        if (n == null) return "—";
        if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
        if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
        return Number(n).toFixed(0);
      };
      const fmtAge = (ms) => {
        if (ms == null) return "—";
        const s = Math.floor(ms / 1000);
        if (s < 60) return s + "s";
        if (s < 3600) return Math.floor(s / 60) + "m";
        return Math.floor(s / 3600) + "h";
      };

      // Запоминаем последнюю цену для подсветки flash при изменении
      const lastPrices = {};

      async function loadSnapshot() {
        try {
          const r = await fetch("/api/snapshot");
          const data = await r.json();
          mlData = data.ml || null;
          render(data);
          updateStatus(data);
        } catch (e) {
          $("wsPill").className = "status-pill error";
          $("wsStatus").textContent = "connection error";
        }
      }

      function updateStatus(data) {
        const ws = data.ws || {};
        const since = ws.sinceLastMs;
        let cls = "status-pill";
        let text = "live";

        if (!ws.connected) {
          cls = "status-pill error";
          text = "disconnected";
        } else if (since == null) {
          cls = "status-pill warn";
          text = "no data";
        } else if (since > 30000) {
          cls = "status-pill error";
          text = "stale " + fmtAge(since);
        } else if (since > 5000) {
          cls = "status-pill warn";
          text = "slow " + fmtAge(since);
        } else {
          text = "live · " + fmtAge(since);
        }

        $("wsPill").className = cls;
        $("wsStatus").textContent = text;
        $("msgCount").textContent =
          (ws.messagesReceived || 0).toLocaleString() + " msg";
        $("lastUpdate").textContent = new Date().toLocaleTimeString("ru-RU");
      }

      function render(data) {
        const cards = $("cards");
        const existing = new Map(
          [...cards.children].map((el) => [el.dataset.symbol, el]),
        );
        const seen = new Set();

        for (const s of data.snapshots) {
          if (!s) continue;
          seen.add(s.symbol);
          const lev = (data.levels && data.levels[s.symbol]) || {};

          const prev = lastPrices[s.symbol];
          let flash = "";
          if (prev != null && s.price != null && prev !== s.price) {
            flash = s.price > prev ? "flash-up" : "flash-down";
          }
          lastPrices[s.symbol] = s.price;

          let el = existing.get(s.symbol);
          if (!el) {
            el = document.createElement("div");
            el.className = "card";
            el.dataset.symbol = s.symbol;
            cards.appendChild(el);
          }
          el.innerHTML = renderCard(s, lev, flash);
        }

        for (const [sym, el] of existing) {
          if (!seen.has(sym)) el.remove();
        }
      }

      function renderCard(s, lev, flash) {
        const change = s.priceChangePct24h;
        const decimals = s.symbol === "SOLUSDT" ? 2 : 1;

        let nearestR = null,
          nearestS = null;
        if (lev.resistances && s.price) {
          nearestR = lev.resistances
            .filter((x) => x > s.price)
            .sort((a, b) => a - b)[0];
        }
        if (lev.supports && s.price) {
          nearestS = lev.supports
            .filter((x) => x < s.price)
            .sort((a, b) => b - a)[0];
        }

        const trendCls = (t) => t?.trend || "neutral";
        const arrow = (t) => {
          if (!t) return "·";
          return t.trend === "bullish"
            ? "↑"
            : t.trend === "bearish"
              ? "↓"
              : t.trend === "mixed"
                ? "↔"
                : "·";
        };

        const tf1d = s.timeframes?.["1d"];
        const fundingPct = s.funding != null ? s.funding * 100 : null;
        const fundingClass =
          fundingPct == null ? "" : Math.abs(fundingPct) > 0.05 ? "warn" : "";

        // OI deltas: используем 5m из API, если есть; иначе из памяти
        const oiD5m = s.oiDelta5mApi ?? s.oiDelta5m;
        const oiClass5m =
          oiD5m == null
            ? ""
            : Math.abs(oiD5m) > 1
              ? "warn"
              : oiD5m > 0
                ? "pos"
                : "neg";
        const oiClass1h =
          s.oiDelta1hApi == null
            ? ""
            : Math.abs(s.oiDelta1hApi) > 3
              ? "warn"
              : s.oiDelta1hApi > 0
                ? "pos"
                : "neg";

        // Basis: премия фьюч vs спот
        const basisClass =
          s.basis == null
            ? ""
            : Math.abs(s.basis) > 0.1
              ? "warn"
              : s.basis > 0
                ? "pos"
                : "neg";

        // Taker buy/sell ratio
        const takerClass =
          s.takerBuySellRatio == null
            ? ""
            : s.takerBuySellRatio > 1.1
              ? "pos"
              : s.takerBuySellRatio < 0.9
                ? "neg"
                : "";

        // Smart Money дивергенция: толпа vs топы
        let divergenceClass = "";
        let divergenceText = "";
        if (s.longShortRatio != null && s.topPositionLS != null) {
          const crowdLong = s.longShortRatio > 1;
          const topsLong = s.topPositionLS > 1;
          if (crowdLong !== topsLong) {
            divergenceClass = "div-strong";
            divergenceText = topsLong
              ? "↑ топы против толпы (бычий)"
              : "↓ топы против толпы (медвежий)";
          } else if (Math.abs(s.longShortRatio - s.topPositionLS) > 1) {
            divergenceClass = "div-mild";
            divergenceText = "расхождение в силе";
          } else {
            divergenceText = "единогласно";
          }
        }

        const fmtPctNoPlus = (n) =>
          n == null ? "—" : (n * 100).toFixed(0) + "%";

        const tickAge = s.lastTickerAt ? Date.now() - s.lastTickerAt : null;
        let tickClass = "";
        let tickText = "—";
        if (tickAge != null) {
          tickText = "last tick " + fmtAge(tickAge) + " ago";
          if (tickAge > 30000) tickClass = "dead";
          else if (tickAge > 5000) tickClass = "warn";
        } else {
          tickText = "нет ws-тиков, цена из свечи";
          tickClass = "warn";
        }

        return `
      <div class="card-head">
        <div class="symbol">${s.symbol}</div>
        <div class="meta">vol24h ${fmtBig(s.volume24h)}</div>
      </div>
      <div class="price-row">
        <div class="price ${flash}">${fmt(s.price, decimals)}</div>
        <div class="change ${change >= 0 ? "pos" : "neg"}">${fmtPct(change)}</div>
      </div>
      <div class="tick-line ${tickClass}">${tickText}</div>
      <div class="tf-row">
        ${["15m", "1h", "4h", "1d"]
          .map((tf) => {
            const t = s.timeframes?.[tf];
            return `<div class="tf ${trendCls(t)}">
            <span class="label">${tf}</span>
            <span class="arrow">${arrow(t)}</span>
          </div>`;
          })
          .join("")}
      </div>
      <div class="data-grid">
        <div class="data-row"><span class="key">funding 8h</span><span class="val ${fundingClass}">${fundingPct != null ? fundingPct.toFixed(4) + "%" : "—"}</span></div>
        <div class="data-row"><span class="key">basis %</span><span class="val ${basisClass}">${fmt(s.basis, 4)}</span></div>
        <div class="data-row"><span class="key">OI Δ 5m</span><span class="val ${oiClass5m}">${fmtPct(oiD5m)}</span></div>
        <div class="data-row"><span class="key">OI Δ 1h</span><span class="val ${oiClass1h}">${fmtPct(s.oiDelta1hApi)}</span></div>
        <div class="data-row"><span class="key">RSI 1d</span><span class="val">${fmt(tf1d?.rsi, 1)}</span></div>
        <div class="data-row"><span class="key">taker B/S</span><span class="val ${takerClass}">${fmt(s.takerBuySellRatio, 2)}</span></div>
      </div>

      <div class="smart-money">
        <div class="sm-title">smart money <span class="sm-divergence ${divergenceClass}">${divergenceText}</span></div>
        <div class="sm-row">
          <div class="sm-side">
            <div class="sm-label">толпа (все аккаунты)</div>
            <div class="sm-bar">
              <div class="sm-bar-long" style="width: ${(s.longAccountPct || 0) * 100}%"></div>
              <div class="sm-bar-short" style="width: ${(s.shortAccountPct || 0) * 100}%"></div>
            </div>
            <div class="sm-meta">
              <span class="sm-long">L ${fmtPctNoPlus(s.longAccountPct)}</span>
              <span class="sm-ratio">L/S ${fmt(s.longShortRatio, 2)}</span>
              <span class="sm-short">S ${fmtPctNoPlus(s.shortAccountPct)}</span>
            </div>
          </div>
          <div class="sm-side">
            <div class="sm-label">топы (по позициям)</div>
            <div class="sm-bar">
              <div class="sm-bar-long" style="width: ${(s.topPositionLong || 0) * 100}%"></div>
              <div class="sm-bar-short" style="width: ${(s.topPositionShort || 0) * 100}%"></div>
            </div>
            <div class="sm-meta">
              <span class="sm-long">L ${fmtPctNoPlus(s.topPositionLong)}</span>
              <span class="sm-ratio">L/S ${fmt(s.topPositionLS, 2)}</span>
              <span class="sm-short">S ${fmtPctNoPlus(s.topPositionShort)}</span>
            </div>
          </div>
        </div>
      </div>

      ${s.symbol === "BTCUSDT" ? renderMLBlock() : ""}

      ${renderCVDBlock(s)}
      ${renderOrderBookBlock(s, decimals)}
      ${renderMagnetsBlock(s, decimals)}
      ${renderCoinbasePremiumBlock(s)}
      ${renderFundingTrendBlock(s)}
      ${renderAggFundingBlock(s)}
      ${renderDeribitBlock(s)}
      ${renderSolanaOnchainBlock(s)}

      <div class="levels-bar">
        <div class="lvl r"><span>сопрот.</span><strong>${nearestR ?? "—"}</strong></div>
        <div class="lvl s"><span>поддерж.</span><strong>${nearestS ?? "—"}</strong></div>
      </div>
    `;
      }

      // глобальное состояние ML
      let mlData = null;

      // ─── CVD Block (Spot vs Perp flow) ───
      function renderCVDBlock(s) {
        const c = s.cvd;
        if (!c || !c.spot || !c.perp) {
          return `<div class="cvd-block"><div class="cvd-title">📈 CVD · spot vs perp</div><div class="ml-na">загрузка...</div></div>`;
        }
        const sRatio = c.spot.ratio;
        const pRatio = c.perp.ratio;
        const sCls =
          sRatio == null
            ? ""
            : sRatio > 1.1
              ? "pos"
              : sRatio < 0.9
                ? "neg"
                : "";
        const pCls =
          pRatio == null
            ? ""
            : pRatio > 1.1
              ? "pos"
              : pRatio < 0.9
                ? "neg"
                : "";

        const divMap = {
          squeeze_setup: { cls: "squeeze", text: "↑ SQUEEZE SETUP" },
          trap_setup: { cls: "trap", text: "↓ LONG TRAP" },
          aligned_bull: { cls: "bull", text: "↑ aligned bull" },
          aligned_bear: { cls: "bear", text: "↓ aligned bear" },
          neutral: { cls: "", text: "neutral" },
        };
        const dv = divMap[c.divergence] || divMap.neutral;

        const fmtVol = (n) => {
          if (n == null) return "—";
          const abs = Math.abs(n);
          const sign = n >= 0 ? "+" : "-";
          if (abs >= 1e6) return sign + (abs / 1e6).toFixed(2) + "M";
          if (abs >= 1e3) return sign + (abs / 1e3).toFixed(1) + "K";
          return sign + abs.toFixed(0);
        };

        return `
      <div class="cvd-block">
        <div class="cvd-title">
          <span>📈 CVD · spot vs perp (1k trades)</span>
          <span class="cvd-divergence ${dv.cls}">${dv.text}</span>
        </div>
        <div class="cvd-row">
          <div class="cvd-side">
            <div class="cvd-label">spot (real money)</div>
            <div class="cvd-meta">
              <span>B/S</span>
              <span class="cvd-ratio ${sCls}">${fmt(sRatio, 2)}</span>
            </div>
            <div class="cvd-meta">
              <span class="cvd-net">net: ${fmtVol(c.spot.cvd)}</span>
            </div>
          </div>
          <div class="cvd-side">
            <div class="cvd-label">perp (leveraged)</div>
            <div class="cvd-meta">
              <span>B/S</span>
              <span class="cvd-ratio ${pCls}">${fmt(pRatio, 2)}</span>
            </div>
            <div class="cvd-meta">
              <span class="cvd-net">net: ${fmtVol(c.perp.cvd)}</span>
            </div>
          </div>
        </div>
      </div>
    `;
      }

      // ─── Order Book Block ───
      function renderOrderBookBlock(s, decimals) {
        const ob = s.orderBook;
        if (!ob || !ob.imb1pct) {
          return `<div class="ob-block"><div class="ob-title">📚 Order Book Imbalance</div><div class="ml-na">загрузка...</div></div>`;
        }

        const imbClass = (v) =>
          v == null ? "" : v > 0.1 ? "pos" : v < -0.1 ? "neg" : "";
        const fmtImb = (v) =>
          v == null ? "—" : (v >= 0 ? "+" : "") + (v * 100).toFixed(0) + "%";

        const bidWall = ob.imb2pct?.largestBidWall;
        const askWall = ob.imb2pct?.largestAskWall;
        const fmtWallSize = (n) => {
          if (!n) return "—";
          if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
          if (n >= 1e3) return (n / 1e3).toFixed(0) + "K";
          return n.toFixed(0);
        };

        return `
      <div class="ob-block">
        <div class="ob-title">📚 Order Book Imbalance · spread ${fmt(ob.spread, 3)}%</div>
        <div class="ob-imb-row">
          <div class="ob-imb">
            <div class="lbl">±1%</div>
            <div class="val ${imbClass(ob.imb1pct.imbalance)}">${fmtImb(ob.imb1pct.imbalance)}</div>
          </div>
          <div class="ob-imb">
            <div class="lbl">±2%</div>
            <div class="val ${imbClass(ob.imb2pct.imbalance)}">${fmtImb(ob.imb2pct.imbalance)}</div>
          </div>
          <div class="ob-imb">
            <div class="lbl">±5%</div>
            <div class="val ${imbClass(ob.imb5pct.imbalance)}">${fmtImb(ob.imb5pct.imbalance)}</div>
          </div>
        </div>
        <div class="ob-walls">
          <div class="ob-wall bid">
            <span class="lbl">bid wall</span>
            ${bidWall?.price ? fmt(bidWall.price, decimals) + " · $" + fmtWallSize(bidWall.qty) : "—"}
          </div>
          <div class="ob-wall ask">
            <span class="lbl">ask wall</span>
            ${askWall?.price ? fmt(askWall.price, decimals) + " · $" + fmtWallSize(askWall.qty) : "—"}
          </div>
        </div>
      </div>
    `;
      }

      // ─── Coinbase Premium Block ───
      function renderCoinbasePremiumBlock(s) {
        const cb = s.coinbasePremium;
        if (!cb) {
          return `<div class="cb-block"><div class="cb-left"><div class="cb-title">🇺🇸 Coinbase Premium</div></div><div class="cb-right"><span class="ml-na">загрузка...</span></div></div>`;
        }
        const interpMap = {
          us_buying_strong: "US BUYING (strong)",
          us_buying_mild: "us buying (mild)",
          us_selling_strong: "US SELLING (strong)",
          us_selling_mild: "us selling (mild)",
          neutral: "neutral",
        };
        const cls = cb.premiumPct > 0 ? "pos" : cb.premiumPct < 0 ? "neg" : "";
        const sign = cb.premiumPct >= 0 ? "+" : "";

        return `
      <div class="cb-block">
        <div class="cb-left">
          <div class="cb-title">🇺🇸 Coinbase Premium</div>
          <div class="cb-sub">CB $${fmt(cb.coinbasePrice, 2)} vs BN $${fmt(cb.binancePrice, 2)}</div>
        </div>
        <div class="cb-right">
          <div class="cb-premium ${cls}">${sign}${fmt(cb.premiumPct, 3)}%</div>
          <div class="cb-interp">${interpMap[cb.interpretation] || cb.interpretation}</div>
        </div>
      </div>
    `;
      }

      // ─── Funding Trend Block ───
      function renderFundingTrendBlock(s) {
        const ft = s.fundingTrend;
        if (!ft || ft.samples === 0) {
          return `<div class="ft-block"><div class="ft-title">💰 Funding Trend</div><div class="ml-na">накапливаю историю...</div></div>`;
        }
        const fmtRate = (r) => (r == null ? "—" : (r * 100).toFixed(4) + "%");
        const cls = (r) =>
          r == null ? "" : r > 0 ? "pos" : r < 0 ? "neg" : "";

        const trendMap = {
          heating_long: "🔥 heating long",
          heating_short: "❄️ heating short",
          cooling: "cooling",
          neutral: "neutral",
        };

        return `
      <div class="ft-block">
        <div class="ft-title">
          <span>💰 Funding Trend</span>
          <span class="ft-trend ${ft.trend}">${trendMap[ft.trend] || ft.trend}</span>
        </div>
        <div class="ft-row">
          <div class="ft-cell">
            <div class="lbl">now</div>
            <div class="val ${cls(ft.current)}">${fmtRate(ft.current)}</div>
          </div>
          <div class="ft-cell">
            <div class="lbl">avg 24h</div>
            <div class="val ${cls(ft.avg24h)}">${fmtRate(ft.avg24h)}</div>
          </div>
          <div class="ft-cell">
            <div class="lbl">avg 7d</div>
            <div class="val ${cls(ft.avg7d)}">${fmtRate(ft.avg7d)}</div>
          </div>
        </div>
      </div>
    `;
      }

      // ─── Stop Hunting / Magnets ───
      function renderMagnetsBlock(s, decimals) {
        const sh = s.stopHunting;
        if (!sh) {
          return `<div class="magnets-block"><div class="magnets-title">🎯 Liquidation Magnets</div><div class="ml-na">расчёт уровней...</div></div>`;
        }

        const renderItem = (m, dir) => {
          if (!m) return "";
          const conf =
            m.confluence > 1
              ? `<span class="magnets-conf">×${m.confluence}</span>`
              : "";
          const strong = m.strength === "high" ? " strong" : "";
          return `
            <div class="magnets-item ${dir}${strong}">
              <span class="price">${fmt(m.price, decimals)}${conf}</span>
              <span class="dist">${fmt(m.distance_pct, 2)}%</span>
            </div>`;
        };

        const above = (sh.magnets_above || []).slice(0, 3);
        const below = (sh.magnets_below || []).slice(0, 3);

        let strongestHtml = "";
        if (sh.strongest_magnet) {
          const m = sh.strongest_magnet;
          const dir = m.price > sh.price ? "↑" : "↓";
          strongestHtml = `
            <div class="magnets-strongest">
              сильнейший: ${dir} <strong>${fmt(m.price, decimals)}</strong>
              (${fmt(m.distance_pct, 2)}%, ${m.types ? m.types.length : 1} типов уровня)
            </div>`;
        }

        return `
      <div class="magnets-block">
        <div class="magnets-title">🎯 Liquidation Magnets</div>
        <div class="magnets-row">
          <div class="magnets-side">
            <div class="lbl">↑ выше цены</div>
            ${above.map((m) => renderItem(m, "above")).join("") || '<div class="ml-na">нет</div>'}
          </div>
          <div class="magnets-side">
            <div class="lbl">↓ ниже цены</div>
            ${below.map((m) => renderItem(m, "below")).join("") || '<div class="ml-na">нет</div>'}
          </div>
        </div>
        ${strongestHtml}
      </div>
    `;
      }

      // ─── Aggregate Funding ───
      function renderAggFundingBlock(s) {
        const af = s.aggFunding;
        if (!af) {
          return `<div class="aggfund-block"><div class="aggfund-title">💱 Aggregate Funding</div><div class="ml-na">загрузка...</div></div>`;
        }

        const fmtRate = (r) => (r == null ? "—" : (r * 100).toFixed(4) + "%");
        const rateCls = (r) =>
          r == null ? "" : r > 0 ? "pos" : r < 0 ? "neg" : "";

        const extremeMap = {
          all_long_extreme: "⚠️ ALL LONG EXTREME",
          all_short_extreme: "⚠️ ALL SHORT EXTREME",
        };
        const extremeText = af.alignedExtreme
          ? extremeMap[af.alignedExtreme]
          : "";
        const extremeCls = af.alignedExtreme || "";

        const divergenceText =
          af.divergence && af.divergence !== "aligned"
            ? af.divergence.replace(/_/g, " ")
            : "aligned";

        return `
      <div class="aggfund-block">
        <div class="aggfund-title">
          <span>💱 Aggregate Funding · 3 exchanges</span>
          ${extremeText ? `<span class="aggfund-extreme ${extremeCls}">${extremeText}</span>` : ""}
        </div>
        <div class="aggfund-row">
          <div class="aggfund-cell">
            <div class="ex">BINANCE</div>
            <div class="rate ${rateCls(af.binance)}">${fmtRate(af.binance)}</div>
          </div>
          <div class="aggfund-cell">
            <div class="ex">BYBIT</div>
            <div class="rate ${rateCls(af.bybit)}">${fmtRate(af.bybit)}</div>
          </div>
          <div class="aggfund-cell">
            <div class="ex">OKX</div>
            <div class="rate ${rateCls(af.okx)}">${fmtRate(af.okx)}</div>
          </div>
          <div class="aggfund-cell avg">
            <div class="ex">AVG</div>
            <div class="rate ${rateCls(af.avg)}">${fmtRate(af.avg)}</div>
          </div>
        </div>
        <div class="aggfund-divergence">
          ${af.divergence !== "aligned" ? `divergence: <strong>${divergenceText}</strong>` : "all aligned"}
        </div>
      </div>
    `;
      }

      // ─── Deribit Options (только BTC/ETH) ───
      function renderDeribitBlock(s) {
        if (s.symbol !== "BTCUSDT" && s.symbol !== "ETHUSDT") return "";
        const d = s.deribit;
        if (!d) {
          return `<div class="deribit-block"><div class="deribit-title">📐 Deribit Options</div><div class="ml-na">загрузка...</div></div>`;
        }
        if (!d.available) {
          return `<div class="deribit-block"><div class="deribit-title">📐 Deribit Options</div><div class="ml-na">нет данных</div></div>`;
        }

        const pcrInterpMap = {
          heavy_puts: "heavy puts (bullish)",
          more_puts: "more puts",
          heavy_calls: "heavy calls (bearish)",
          more_calls: "more calls",
          neutral: "neutral",
        };

        const maxPainBiasMap = {
          pulls_up: "↑ pulls up",
          pulls_down: "↓ pulls down",
          neutral: "neutral",
        };

        const decimals = s.symbol === "BTCUSDT" ? 0 : 1;

        let strikesHtml = "";
        if (Array.isArray(d.topStrikes) && d.topStrikes.length > 0) {
          strikesHtml = `
        <div class="deribit-strikes">
          <div style="margin-bottom: 3px;">top strikes by OI:</div>
          ${d.topStrikes
            .slice(0, 3)
            .map(
              (st) => `
            <div class="deribit-strike-row">
              <span class="deribit-strike-price">${fmt(st.strike, decimals)}</span>
              <span>C ${fmt(st.callOi, 0)} · P ${fmt(st.putOi, 0)}</span>
            </div>`,
            )
            .join("")}
        </div>`;
        }

        return `
      <div class="deribit-block">
        <div class="deribit-title">
          <span>📐 Deribit Options</span>
          <span class="deribit-expiry">${d.nearestExpiry} · ${fmt(d.daysToExpiry, 1)}d</span>
        </div>
        <div class="deribit-row">
          <div class="deribit-cell">
            <div class="lbl">PCR near</div>
            <div class="val">${fmt(d.putCallRatio, 2)}</div>
            <div class="interp ${d.pcrInterpretation}">${pcrInterpMap[d.pcrInterpretation] || d.pcrInterpretation}</div>
          </div>
          <div class="deribit-cell">
            <div class="lbl">Max Pain</div>
            <div class="val">${fmt(d.maxPainStrike, decimals)}</div>
            <div class="interp ${d.maxPainBias}">${maxPainBiasMap[d.maxPainBias] || d.maxPainBias} (${fmt(d.maxPainDistancePct, 1)}%)</div>
          </div>
          <div class="deribit-cell">
            <div class="lbl">PCR agg</div>
            <div class="val">${fmt(d.putCallRatioAgg, 2)}</div>
            <div class="interp">all expiries</div>
          </div>
        </div>
        ${strikesHtml}
      </div>
    `;
      }

      // ─── On-chain Solana Block (только для SOL) ───
      function renderSolanaOnchainBlock(s) {
        if (s.symbol !== "SOLUSDT") return "";
        const oc = s.solanaOnchain;
        if (!oc) {
          return `<div class="onchain-block"><div class="onchain-title">🌐 Solana on-chain</div><div class="ml-na">загрузка...</div></div>`;
        }

        const interpMap = {
          fundamental_bullish: "↑ FUNDAMENTAL BULL",
          fundamental_bearish: "↓ FUNDAMENTAL BEAR",
          mixed: "MIXED",
          neutral: "neutral",
        };

        const fmtBigUsd = (n) => {
          if (n == null) return "—";
          const abs = Math.abs(n);
          if (abs >= 1e9) return "$" + (n / 1e9).toFixed(2) + "B";
          if (abs >= 1e6) return "$" + (n / 1e6).toFixed(1) + "M";
          if (abs >= 1e3) return "$" + (n / 1e3).toFixed(0) + "K";
          return "$" + n.toFixed(0);
        };
        const fmtDelta = (n) =>
          n == null ? "" : (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
        const deltaCls = (n) =>
          n == null ? "" : n > 0 ? "pos" : n < 0 ? "neg" : "";

        const tvl = oc.tvl?.tvl;
        const tvlChg = oc.tvl?.change24h;
        const stables = oc.stables?.supply;
        const stablesNet = oc.stables?.netInflow24h;
        const stablesChg = oc.stables?.change24h;
        const dexVol = oc.dexVolume?.volume24h;
        const dexChg = oc.dexVolume?.change24h;

        let protosHtml = "";
        if (Array.isArray(oc.topProtocols) && oc.topProtocols.length > 0) {
          const rows = oc.topProtocols
            .map(
              (p) => `
            <div class="onchain-proto-row">
              <span class="onchain-proto-name">${p.name}</span>
              <span>${fmtBigUsd(p.tvl)} <span class="onchain-proto-change ${deltaCls(p.change1d)}">${fmtDelta(p.change1d)}</span></span>
            </div>`,
            )
            .join("");
          protosHtml = `
        <div class="onchain-protos">
          <div class="onchain-protos-title">top protocols · 24h</div>
          ${rows}
        </div>`;
        }

        return `
      <div class="onchain-block">
        <div class="onchain-title">
          <span>🌐 Solana on-chain · DefiLlama</span>
          <span class="onchain-interp ${oc.interpretation}">${interpMap[oc.interpretation] || oc.interpretation}</span>
        </div>
        <div class="onchain-row">
          <div class="onchain-cell">
            <div class="lbl">TVL chain</div>
            <div class="val">${fmtBigUsd(tvl)}</div>
            <div class="delta ${deltaCls(tvlChg)}">${fmtDelta(tvlChg)}</div>
          </div>
          <div class="onchain-cell">
            <div class="lbl">stablecoins</div>
            <div class="val">${fmtBigUsd(stables)}</div>
            <div class="delta ${deltaCls(stablesChg)}">${fmtDelta(stablesChg)}${stablesNet != null ? " · net " + fmtBigUsd(stablesNet) : ""}</div>
          </div>
          <div class="onchain-cell">
            <div class="lbl">DEX vol 24h</div>
            <div class="val">${fmtBigUsd(dexVol)}</div>
            <div class="delta ${deltaCls(dexChg)}">${fmtDelta(dexChg)}</div>
          </div>
        </div>
        ${protosHtml}
      </div>
    `;
      }

      function renderMLBlock() {
        if (!mlData) {
          return `<div class="ml-block"><div class="ml-title">🤖 ML Signal · BTC 1h LSTM</div><div class="ml-na">загрузка...</div></div>`;
        }
        if (!mlData.available) {
          const errMsg = mlData.lastError
            ? "ошибка: " + mlData.lastError.slice(0, 80)
            : "ожидание данных";
          return `<div class="ml-block"><div class="ml-title">🤖 ML Signal · BTC 1h LSTM</div><div class="ml-na">${errMsg}</div></div>`;
        }

        const ageS = Math.round(mlData.ageMs / 1000);
        const ageText = ageS < 60 ? ageS + "s" : Math.floor(ageS / 60) + "m";

        const buyPct = mlData.buy * 100;
        const holdPct = mlData.hold * 100;
        const sellPct = mlData.sell * 100;

        const sigClass = mlData.signal.toLowerCase();

        return `
      <div class="ml-block">
        <div class="ml-title">
          <span>🤖 ML Signal · BTC 1h LSTM</span>
          <span class="ml-age">${ageText} ago</span>
        </div>
        <div class="ml-signal-row">
          <span class="ml-badge ${sigClass}">${mlData.signal}</span>
          <span class="ml-conf">confidence ${(mlData.confidence * 100).toFixed(1)}%</span>
        </div>
        <div class="ml-bars">
          <div class="b" style="width: ${buyPct}%"></div>
          <div class="h" style="width: ${holdPct}%"></div>
          <div class="s" style="width: ${sellPct}%"></div>
        </div>
        <div class="ml-probs">
          <span class="b">buy ${buyPct.toFixed(1)}%</span>
          <span class="h">hold ${holdPct.toFixed(1)}%</span>
          <span class="s">sell ${sellPct.toFixed(1)}%</span>
        </div>
      </div>
    `;
      }

      $("getAdvice").addEventListener("click", async () => {
        const btn = $("getAdvice");
        const out = $("advice");
        btn.disabled = true;
        btn.textContent = "думаю...";
        out.classList.remove("placeholder");
        out.textContent = "...";
        try {
          const r = await fetch("/api/advice", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });
          const data = await r.json();
          if (data.advice) {
            const escaped = data.advice
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            const withBold = escaped
              .replace(/&lt;b&gt;/gi, "<b>")
              .replace(/&lt;\/b&gt;/gi, "</b>");
            out.innerHTML = withBold;
            $("adviceTime").textContent =
              "обновлено · " + new Date(data.time).toLocaleString("ru-RU");
          } else {
            out.textContent = "ошибка: " + (data.error || "unknown");
          }
        } catch (e) {
          out.textContent = "ошибка: " + e.message;
        }
        btn.disabled = false;
        btn.textContent = "обновить совет";
      });

      loadSnapshot();
      setInterval(loadSnapshot, 2000); // обновляем чаще — раз в 2 сек
    </script>
  </body>
</html>
